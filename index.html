<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>키보드 입력 테스트</title>
<style>
  :root{
    --u: clamp(26px, 5.2vw, 54px);
    --gap: 6px;
    /* ── 라이트 테마 (기본) ── */
    --bg:#ffffff;
    --surface:#ffffff;
    --key-border:#e4e4e7;
    --key-shadow:0 1px 0 #d4d4d8, 0 2px 4px rgba(0,0,0,.04);
    --text:#3f3f46;
    --muted:#a1a1aa;
    --ink:#18181b;
    --active-text:#ffffff;
    --hover:#f4f4f5;
    --tested-bg:#f4f4f5;
    --tested-border:#d4d4d8;
    --track:#f4f4f5;
  }
  :root[data-theme="dark"]{
    /* ── 다크 테마 ── */
    --bg:#18181b;
    --surface:#27272a;
    --key-border:#3f3f46;
    --key-shadow:0 1px 0 #09090b, 0 2px 4px rgba(0,0,0,.35);
    --text:#d4d4d8;
    --muted:#71717a;
    --ink:#fafafa;
    --active-text:#18181b;
    --hover:#3f3f46;
    --tested-bg:#3f3f46;
    --tested-border:#52525b;
    --track:#27272a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:40px 16px 56px;
    transition:background .2s,color .2s;
  }
  header{text-align:center;margin-bottom:28px;}
  h1{font-size:24px;font-weight:700;color:var(--ink);margin:0 0 6px;}
  header p{margin:0;font-size:14px;color:var(--muted);}

  .panel{
    display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
    width:100%;max-width:760px;margin-bottom:30px;
  }
  .big{
    flex:0 0 168px;height:150px;
    border:1px solid var(--key-border);border-radius:16px;background:var(--surface);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:background .2s,border-color .2s;
  }
  .big .glyph{font-weight:700;color:var(--ink);line-height:1;text-align:center;padding:0 8px;}
  .big .cap{font-size:12px;color:var(--muted);margin-top:12px;}
  .details{flex:1 1 360px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .detail{
    border:1px solid var(--key-border);border-radius:12px;padding:12px 14px;background:var(--surface);
    transition:background .2s,border-color .2s;
  }
  .detail .lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .detail .val{
    font-size:18px;font-weight:600;color:var(--ink);margin-top:5px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  .board-wrap{width:100%;overflow-x:auto;display:flex;justify-content:center;padding-bottom:6px;}
  .board{display:flex;gap:calc(var(--gap)*2);align-items:flex-start;}
  .block{display:flex;flex-direction:column;}
  .row{display:flex;gap:var(--gap);}
  .row + .row{margin-top:var(--gap);}
  .key{
    height:var(--u);
    width:calc(var(--u)*var(--w,1) + var(--gap)*(var(--w,1) - 1));
    border:1px solid var(--key-border);border-radius:8px;
    background:var(--surface);box-shadow:var(--key-shadow);
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(9px,1.6vw,12px);color:var(--text);
    user-select:none;cursor:pointer;
    transition:background .04s,color .04s,transform .04s,box-shadow .04s,border-color .04s;
  }
  .key.arrow{font-size:16px;}
  .key:hover{background:var(--hover);}
  .key.tested{background:var(--tested-bg);border-color:var(--tested-border);}
  .key.active{
    background:var(--ink);color:var(--active-text);border-color:var(--ink);
    transform:translateY(2px);box-shadow:none;
  }
  .spacer{height:var(--u);width:calc(var(--u)*var(--sp));}

  footer{
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;
    margin-top:30px;width:100%;max-width:760px;
  }
  .progress{flex:1 1 240px;}
  .progress .ptext{font-size:13px;color:var(--text);margin-bottom:6px;}
  .progress .ptext b{color:var(--ink);}
  .bar{height:6px;background:var(--track);border-radius:99px;overflow:hidden;}
  .bar > i{display:block;height:100%;width:0;background:var(--ink);border-radius:99px;transition:width .2s;}
  button{
    font:inherit;font-size:13px;font-weight:600;color:var(--ink);
    background:var(--surface);border:1px solid var(--key-border);border-radius:10px;
    padding:10px 18px;cursor:pointer;transition:background .1s,border-color .2s,color .2s;
  }
  button:hover{background:var(--hover);}

  /* ── 테마 전환 토글 ── */
  .theme-toggle{
    position:fixed;top:16px;right:16px;z-index:10;
    width:42px;height:42px;padding:0;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;line-height:1;border-radius:50%;
  }
  .theme-toggle:focus-visible{outline:2px solid var(--ink);outline-offset:2px;}
</style>
<script>
  // 페이지 렌더 전에 테마를 적용해 깜빡임(FOUC) 방지
  (function(){
    try{
      var saved = localStorage.getItem('kbtest-theme');
      var dark = saved
        ? saved === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    }catch(e){/* localStorage 차단 환경 무시 */}
  })();
</script>
</head>
<body>
<button id="themeToggle" class="theme-toggle" type="button"
        aria-label="테마 전환" title="라이트 / 다크 테마 전환">🌙</button>
<header>
  <h1>키보드 입력 테스트</h1>
  <p>키보드를 누르거나 화면의 키를 클릭해 입력을 확인하세요</p>
</header>

<section class="panel">
  <div class="big">
    <div class="glyph" id="glyph" style="font-size:36px;color:var(--muted);">?</div>
    <div class="cap" id="cap">대기 중</div>
  </div>
  <div class="details">
    <div class="detail"><div class="lbl">event.key</div><div class="val" id="d-key">—</div></div>
    <div class="detail"><div class="lbl">event.code</div><div class="val" id="d-code">—</div></div>
    <div class="detail"><div class="lbl">keyCode</div><div class="val" id="d-keycode">—</div></div>
    <div class="detail"><div class="lbl">위치</div><div class="val" id="d-loc">—</div></div>
  </div>
</section>

<div class="board-wrap">
  <div class="board">
    <div class="block" id="mainBlock"></div>
    <div class="block" id="rightBlock"></div>
  </div>
</div>

<footer>
  <div class="progress">
    <div class="ptext"><b id="testedCount">0</b> / <span id="totalCount">0</span> 키 테스트됨</div>
    <div class="bar"><i id="barFill"></i></div>
  </div>
  <button id="resetBtn">초기화</button>
</footer>

<script>
  // ── 키보드 레이아웃 정의 (c = event.code, l = 라벨, w = 너비 단위, sp = 빈 공간) ──
  const mainRows = [
    [
      {l:'Esc',c:'Escape'}, {sp:0.5},
      {l:'F1',c:'F1'},{l:'F2',c:'F2'},{l:'F3',c:'F3'},{l:'F4',c:'F4'}, {sp:0.5},
      {l:'F5',c:'F5'},{l:'F6',c:'F6'},{l:'F7',c:'F7'},{l:'F8',c:'F8'}, {sp:0.5},
      {l:'F9',c:'F9'},{l:'F10',c:'F10'},{l:'F11',c:'F11'},{l:'F12',c:'F12'}
    ],
    [
      {l:'`',c:'Backquote'},{l:'1',c:'Digit1'},{l:'2',c:'Digit2'},{l:'3',c:'Digit3'},
      {l:'4',c:'Digit4'},{l:'5',c:'Digit5'},{l:'6',c:'Digit6'},{l:'7',c:'Digit7'},
      {l:'8',c:'Digit8'},{l:'9',c:'Digit9'},{l:'0',c:'Digit0'},{l:'-',c:'Minus'},
      {l:'=',c:'Equal'},{l:'Backspace',c:'Backspace',w:2}
    ],
    [
      {l:'Tab',c:'Tab',w:1.5},
      {l:'Q',c:'KeyQ'},{l:'W',c:'KeyW'},{l:'E',c:'KeyE'},{l:'R',c:'KeyR'},{l:'T',c:'KeyT'},
      {l:'Y',c:'KeyY'},{l:'U',c:'KeyU'},{l:'I',c:'KeyI'},{l:'O',c:'KeyO'},{l:'P',c:'KeyP'},
      {l:'[',c:'BracketLeft'},{l:']',c:'BracketRight'},{l:'\\',c:'Backslash',w:1.5}
    ],
    [
      {l:'Caps',c:'CapsLock',w:1.75},
      {l:'A',c:'KeyA'},{l:'S',c:'KeyS'},{l:'D',c:'KeyD'},{l:'F',c:'KeyF'},{l:'G',c:'KeyG'},
      {l:'H',c:'KeyH'},{l:'J',c:'KeyJ'},{l:'K',c:'KeyK'},{l:'L',c:'KeyL'},
      {l:';',c:'Semicolon'},{l:"'",c:'Quote'},{l:'Enter',c:'Enter',w:2.25}
    ],
    [
      {l:'Shift',c:'ShiftLeft',w:2.25},
      {l:'Z',c:'KeyZ'},{l:'X',c:'KeyX'},{l:'C',c:'KeyC'},{l:'V',c:'KeyV'},{l:'B',c:'KeyB'},
      {l:'N',c:'KeyN'},{l:'M',c:'KeyM'},{l:',',c:'Comma'},{l:'.',c:'Period'},{l:'/',c:'Slash'},
      {l:'Shift',c:'ShiftRight',w:2.75}
    ],
    [
      {l:'Ctrl',c:'ControlLeft',w:1.25},
      {l:'Win',c:'MetaLeft',w:1.25},
      {l:'Alt',c:'AltLeft',w:1.25},
      {l:'Space',c:'Space',w:6.25},
      {l:'Alt',c:'AltRight',w:1.25},
      {l:'Win',c:'MetaRight',w:1.25},
      {l:'Menu',c:'ContextMenu',w:1.25},
      {l:'Ctrl',c:'ControlRight',w:1.25}
    ]
  ];

  const rightRows = [
    [{l:'PrtSc',c:'PrintScreen'},{l:'ScrLk',c:'ScrollLock'},{l:'Pause',c:'Pause'}],
    [{l:'Insert',c:'Insert'},{l:'Home',c:'Home'},{l:'PgUp',c:'PageUp'}],
    [{l:'Delete',c:'Delete'},{l:'End',c:'End'},{l:'PgDn',c:'PageDown'}],
    [{sp:3}],
    [{sp:1},{l:'↑',c:'ArrowUp'},{sp:1}],
    [{l:'←',c:'ArrowLeft'},{l:'↓',c:'ArrowDown'},{l:'→',c:'ArrowRight'}]
  ];

  const keyMap = {};   // event.code → 키 엘리먼트
  const ARROWS = ['↑','↓','←','→'];

  function buildBlock(rows, container){
    rows.forEach(row=>{
      const rd = document.createElement('div');
      rd.className = 'row';
      row.forEach(k=>{
        if(k.sp !== undefined){
          const s = document.createElement('div');
          s.className = 'spacer';
          s.style.setProperty('--sp', k.sp);
          rd.appendChild(s);
          return;
        }
        const el = document.createElement('div');
        el.className = 'key' + (ARROWS.includes(k.l) ? ' arrow' : '');
        el.dataset.code = k.c;
        if(k.w) el.style.setProperty('--w', k.w);
        el.textContent = k.l;
        keyMap[k.c] = el;
        rd.appendChild(el);
      });
      container.appendChild(rd);
    });
  }
  buildBlock(mainRows, document.getElementById('mainBlock'));
  buildBlock(rightRows, document.getElementById('rightBlock'));

  // ── 상태 ──
  const total = Object.keys(keyMap).length;
  const tested = new Set();
  document.getElementById('totalCount').textContent = total;

  const glyphEl   = document.getElementById('glyph');
  const capEl     = document.getElementById('cap');
  const dKey      = document.getElementById('d-key');
  const dCode     = document.getElementById('d-code');
  const dKeycode  = document.getElementById('d-keycode');
  const dLoc      = document.getElementById('d-loc');
  const testedEl  = document.getElementById('testedCount');
  const barFill   = document.getElementById('barFill');

  const locNames = ['표준','왼쪽','오른쪽','넘패드'];

  function locFromCode(code){
    if(code.startsWith('Numpad')) return 3;
    if(code.endsWith('Left'))  return 1;
    if(code.endsWith('Right')) return 2;
    return 0;
  }

  function setGlyph(text){
    const len = text.length;
    glyphEl.style.fontSize = len<=2 ? '52px' : len<=5 ? '30px' : '20px';
    glyphEl.style.color = 'var(--ink)';
    glyphEl.textContent = text;
  }

  function showInfo(info){
    const el = keyMap[info.code];
    const label = el ? el.textContent
      : (info.key && info.key.length===1 ? info.key.toUpperCase() : (info.key || '?'));
    setGlyph(label);
    capEl.textContent     = info.source;
    dKey.textContent      = info.key === ' ' ? '" " (Space)' : (info.key ?? '—');
    dCode.textContent     = info.code || '—';
    dKeycode.textContent  = (info.keyCode === undefined || info.keyCode === null) ? '—' : info.keyCode;
    dLoc.textContent      = locNames[info.location] ?? '—';
  }

  function markTested(code){
    const el = keyMap[code];
    if(!el) return;
    el.classList.add('tested');
    if(!tested.has(code)){
      tested.add(code);
      testedEl.textContent = tested.size;
      barFill.style.width = (tested.size / total * 100) + '%';
    }
  }

  // ── 물리 키보드 입력 ──
  window.addEventListener('keydown', e=>{
    const el = keyMap[e.code];
    if(el) el.classList.add('active');
    markTested(e.code);
    showInfo({key:e.key, code:e.code, keyCode:e.keyCode, location:e.location, source:'키보드 입력'});
    if(!e.ctrlKey && !e.metaKey) e.preventDefault();   // Tab/Space/방향키의 기본 동작 차단
  });
  window.addEventListener('keyup', e=>{
    const el = keyMap[e.code];
    if(el) el.classList.remove('active');
  });
  // 창 포커스를 잃으면 keyup 누락 → 눌린 상태 정리
  window.addEventListener('blur', ()=>{
    document.querySelectorAll('.key.active').forEach(el=>el.classList.remove('active'));
  });

  // ── 화면 키 클릭 / 터치 입력 ──
  const board = document.querySelector('.board');
  let pressedEl = null;
  board.addEventListener('pointerdown', e=>{
    const el = e.target.closest('.key');
    if(!el) return;
    e.preventDefault();
    el.classList.add('active');
    pressedEl = el;
    const code = el.dataset.code;
    markTested(code);
    showInfo({key:el.textContent, code:code, keyCode:null, location:locFromCode(code), source:'마우스 클릭'});
  });
  window.addEventListener('pointerup', ()=>{
    if(pressedEl){
      const el = pressedEl;
      pressedEl = null;
      setTimeout(()=>el.classList.remove('active'), 130);   // 빠른 클릭도 보이도록 잠시 유지
    }
  });
  board.addEventListener('contextmenu', e=>e.preventDefault());

  // ── 초기화 ──
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    tested.clear();
    testedEl.textContent = '0';
    barFill.style.width = '0';
    document.querySelectorAll('.key.tested, .key.active')
      .forEach(el=>el.classList.remove('tested','active'));
    glyphEl.textContent = '?';
    glyphEl.style.fontSize = '36px';
    glyphEl.style.color = 'var(--muted)';
    capEl.textContent = '대기 중';
    dKey.textContent = dCode.textContent = dKeycode.textContent = dLoc.textContent = '—';
  });

  // ── 테마 전환 (라이트 / 다크) ──
  const themeToggle = document.getElementById('themeToggle');
  const darkQuery = window.matchMedia('(prefers-color-scheme: dark)');

  function syncToggle(){
    const dark = document.documentElement.dataset.theme === 'dark';
    themeToggle.textContent = dark ? '☀️' : '🌙';
    themeToggle.setAttribute('aria-pressed', String(dark));
    themeToggle.title = (dark ? '라이트' : '다크') + ' 테마로 전환';
  }
  syncToggle();

  themeToggle.addEventListener('click', ()=>{
    const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    try{ localStorage.setItem('kbtest-theme', next); }catch(e){/* 저장 불가 환경 무시 */}
    syncToggle();
  });

  // 사용자가 직접 선택하지 않았다면 시스템 설정 변경을 따라감
  darkQuery.addEventListener('change', e=>{
    let saved = null;
    try{ saved = localStorage.getItem('kbtest-theme'); }catch(err){}
    if(saved) return;
    document.documentElement.dataset.theme = e.matches ? 'dark' : 'light';
    syncToggle();
  });
</script>
</body>
</html>
